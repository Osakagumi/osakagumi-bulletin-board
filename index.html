<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>大坂組社内ポータルサイト</title>
<style>
  :root{
    --brand:#1C5AA5;
    --brand-dark:#124079;
    --bg:#F4F6F9;
    --surface:#FFFFFF;
    --line:#DDE3EC;
    --text:#1F2937;
    --muted:#6B7280;
    --survey:#E8853F;
    --room:#2E9E8F;
    --vehicle:#4B5FA3;
    --danger:#C0392B;
    --mono: "SFMono-Regular", Consolas, "Courier New", monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN", "Yu Gothic", "Noto Sans JP", sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased;}
  button{font-family:inherit;cursor:pointer;}
  input,select{font-family:inherit;}

  /* ---------- Login ---------- */
  #login-screen{
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(180deg,#0F2F55 0%, var(--brand) 100%);
    padding:24px;
  }
  .login-card{
    background:var(--surface);border-radius:14px;padding:36px 32px;width:100%;max-width:360px;
    box-shadow:0 20px 60px rgba(15,47,85,0.35);
  }
  .login-logo{width:64px;height:64px;object-fit:contain;display:block;margin:0 auto 14px;}
  .login-card h1{font-size:20px;margin:0 0 4px;letter-spacing:.02em;text-align:center;}
  .login-card .sub{font-size:12px;color:var(--muted);margin:0 0 24px;font-family:var(--mono);letter-spacing:.03em;text-align:center;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;}
  .field input{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:8px;font-size:14px;}
  .field input:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(28,90,165,.15);}
  #login-btn{width:100%;padding:11px;background:var(--brand);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;margin-top:6px;}
  #login-btn:hover{background:var(--brand-dark);}
  #login-error{color:var(--danger);font-size:12.5px;margin-top:10px;min-height:16px;}

  /* ---------- App shell ---------- */
  #app{display:none;min-height:100vh;flex-direction:column;}
  header{
    background:var(--surface);border-bottom:1px solid var(--line);
    padding:12px 18px;display:flex;align-items:center;justify-content:space-between;
    position:sticky;top:0;z-index:20;
  }
  header .brand{display:flex;align-items:center;gap:10px;}
  header .brand .mark{width:30px;height:30px;object-fit:contain;}
  header .brand .title{font-size:14.5px;font-weight:700;}
  header .brand .title small{display:block;font-weight:400;color:var(--muted);font-size:10.5px;font-family:var(--mono);letter-spacing:.03em;}
  header .user-box{display:flex;align-items:center;gap:10px;font-size:12.5px;color:var(--muted);}
  header .user-box a, header .user-box button{
    border:1px solid var(--line);background:#fff;padding:6px 10px;border-radius:7px;font-size:12px;color:var(--text);text-decoration:none;
  }

  nav.tabs{display:flex;gap:4px;padding:8px 14px 0;background:var(--surface);border-bottom:1px solid var(--line);overflow-x:auto;align-items:center;}
  nav.tabs button{
    background:none;border:none;padding:10px 14px;font-size:13.5px;color:var(--muted);border-bottom:2.5px solid transparent;font-weight:600;white-space:nowrap;
  }
  nav.tabs button.active{color:var(--brand);border-color:var(--brand);}
  .tab-reorder-btn{
    margin-left:auto;background:none;border:1px solid var(--line);border-radius:7px;padding:5px 11px;font-size:11.5px;color:var(--muted);white-space:nowrap;
  }
  nav.tabs.reordering .tab-btn{background:#F4F8FC;border-radius:7px 7px 0 0;}
  .reorder-arrow{
    display:inline-block;padding:0 5px;color:var(--brand);font-size:11px;cursor:pointer;
  }
  .reorder-arrow:hover{color:var(--brand-dark);}
  .section-divider{
    font-size:13px;font-weight:700;color:var(--brand-dark);margin:26px 0 12px;padding-top:16px;border-top:1.5px solid var(--line);
  }

  main{flex:1;padding:16px;max-width:960px;width:100%;margin:0 auto;}

  /* category pills */
  .cat-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
  .cat-pill{
    padding:8px 14px;border-radius:20px;border:1.5px solid var(--line);background:#fff;font-size:13px;font-weight:600;color:var(--muted);
    display:flex;align-items:center;gap:6px;
  }
  .cat-pill .dot{width:8px;height:8px;border-radius:50%;}
  .cat-pill.active{border-color:currentColor;background:rgba(0,0,0,0.02);}

  /* equipment grid */
  .eq-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-bottom:18px;}
  .eq-card{
    background:var(--surface);border:1.5px solid var(--line);border-radius:10px;padding:12px;text-align:left;
  }
  .eq-card.selected{border-color:var(--brand);box-shadow:0 0 0 3px rgba(28,90,165,.12);}
  .eq-card .name{font-size:13.5px;font-weight:700;margin-bottom:2px;}
  .eq-card .note{font-size:11.5px;color:var(--muted);line-height:1.4;}
  .eq-card.empty{color:var(--muted);font-size:12.5px;text-align:center;padding:20px 10px;}

  /* timeline panel */
  #timeline-panel{background:var(--surface);border:1.5px solid var(--line);border-radius:12px;padding:16px;display:none;}
  #timeline-panel.show{display:block;}
  .tl-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px;}
  .tl-head .eq-title{font-size:15px;font-weight:700;}
  .tl-head .eq-title .cat-tag{font-size:10.5px;font-weight:600;font-family:var(--mono);padding:2px 6px;border-radius:4px;margin-left:6px;color:#fff;}
  .date-nav{display:flex;align-items:center;gap:6px;}
  .date-nav button{border:1px solid var(--line);background:#fff;border-radius:6px;width:30px;height:30px;font-size:14px;}
  .date-picker-wrap{position:relative;display:inline-flex;align-items:center;}
  .date-picker-wrap input[type=date]{
    position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer;border:none;padding:0;margin:0;
  }
  .date-picker-label{
    border:1px solid var(--line);border-radius:6px;padding:6px 10px;font-size:13px;font-weight:700;
    color:var(--brand-dark);background:#fff;white-space:nowrap;pointer-events:none;font-family:var(--mono);
  }
  .date-picker-label.weekend-sat{color:#2E6FA3;}
  .date-picker-label.weekend-sun{color:var(--danger);}
  .howto{
    background:#F4F8FC;border:1px solid #DCE8F5;border-radius:8px;padding:9px 12px;font-size:12.5px;color:#2C4A6B;
    margin-bottom:12px;line-height:1.6;
  }

  .timeline-wrap{overflow-x:auto;}
  .timeline{position:relative;min-width:640px;}
  .tl-ruler{display:flex;border-bottom:1px solid var(--line);padding-left:0;}
  .tl-ruler .tick{flex:1;font-family:var(--mono);font-size:10px;color:var(--muted);border-left:1px solid var(--line);padding:2px 0 4px 3px;}
  .tl-slots{display:flex;background:
      repeating-linear-gradient(90deg, transparent, transparent calc(100%/1 - 1px));
    border-bottom:1px solid var(--line);}
  .slot{
    flex:1;height:46px;border-left:1px solid #EDF1F6;position:relative;background:#fff;
  }
  .slot.hour-start{border-left:1px solid var(--line);}
  .slot.free:hover{background:#EFF5FC;cursor:pointer;}
  .slot.pending{background:rgba(28,90,165,0.18);box-shadow:inset 0 0 0 1.5px var(--brand);cursor:pointer;}
  .slot.booked{background:var(--slot-color,#ccc);cursor:default;}
  .slot.booked .lbl{position:absolute;inset:2px 4px;font-size:9.5px;color:#fff;line-height:1.2;overflow:hidden;font-weight:600;}
  .slot.past{background:#F6F7F9;cursor:not-allowed;}

  .legend{display:flex;gap:16px;margin-top:10px;font-size:11.5px;color:var(--muted);flex-wrap:wrap;}
  .legend span{display:inline-flex;align-items:center;gap:5px;}
  .legend i{width:10px;height:10px;border-radius:2px;display:inline-block;}

  .selection-bar{
    margin-top:14px;padding:12px;border-radius:9px;background:#F4F8FC;border:1px dashed var(--brand);
    display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;font-size:13px;
  }
  .selection-bar .range{font-family:var(--mono);font-weight:700;color:var(--brand-dark);}
  .selection-bar .actions button{border:none;border-radius:7px;padding:8px 14px;font-size:13px;font-weight:600;}
  .btn-primary{background:var(--brand);color:#fff;}
  .btn-primary:hover{background:var(--brand-dark);}
  .btn-ghost{background:none;color:var(--muted);}

  /* my reservations */
  .res-list{display:flex;flex-direction:column;gap:8px;}
  .res-item{
    background:var(--surface);border:1.5px solid var(--line);border-radius:10px;padding:12px 14px;
    display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;
  }
  .res-item.past{opacity:.55;}
  .res-item .meta{font-size:13px;}
  .res-item .meta b{display:block;font-size:13.5px;margin-bottom:2px;}
  .res-item .meta .time{font-family:var(--mono);color:var(--muted);font-size:12px;}
  .res-item button{border:1px solid var(--danger);color:var(--danger);background:#fff;border-radius:7px;padding:6px 12px;font-size:12px;}
  .res-item button:hover{background:var(--danger);color:#fff;}
  .empty-state{color:var(--muted);font-size:13px;text-align:center;padding:40px 10px;}

  /* ---------- shared toolbar / toggle ---------- */
  .section-toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px;}
  .seg-toggle{display:inline-flex;border:1.5px solid var(--line);border-radius:8px;overflow:hidden;}
  .seg-btn{background:#fff;border:none;padding:8px 14px;font-size:13px;font-weight:600;color:var(--muted);}
  .seg-btn.active{background:var(--brand);color:#fff;}

  /* ---------- お知らせ ---------- */
  .notice-list{display:flex;flex-direction:column;gap:10px;}
  .notice-item{background:var(--surface);border:1.5px solid var(--line);border-radius:10px;padding:14px 16px;}
  .notice-item .n-head{display:flex;align-items:baseline;justify-content:space-between;gap:8px;margin-bottom:6px;flex-wrap:wrap;}
  .notice-item .n-title{font-size:14.5px;font-weight:700;}
  .notice-item .n-meta{font-size:11.5px;color:var(--muted);font-family:var(--mono);white-space:nowrap;}
  .notice-item .n-body{font-size:13.5px;line-height:1.7;white-space:pre-wrap;color:var(--text);}
  .notice-item .n-actions{margin-top:8px;}
  .notice-item .n-actions button{border:1px solid var(--danger);color:var(--danger);background:#fff;border-radius:7px;padding:5px 11px;font-size:11.5px;}
  .notice-item .n-actions button:hover{background:var(--danger);color:#fff;}

  /* ---------- 行き先 ---------- */
  .wb-table{width:100%;border-collapse:collapse;font-size:13px;background:var(--surface);border:1.5px solid var(--line);border-radius:10px;overflow:hidden;}
  .wb-table th{text-align:left;padding:9px 10px;background:#F0F3F8;color:var(--muted);font-size:11.5px;font-weight:700;border-bottom:1px solid var(--line);}
  .wb-table td{padding:9px 10px;border-bottom:1px solid var(--line);vertical-align:middle;}
  .wb-table tr.dept-row td{background:#FAFBFC;font-size:11px;font-weight:700;color:var(--brand-dark);letter-spacing:.03em;padding:6px 10px;}
  .wb-table tr:last-child td{border-bottom:none;}
  .wb-status-badge{display:inline-block;padding:4px 10px;border-radius:14px;font-size:12px;font-weight:700;color:#fff;white-space:nowrap;}
  .wb-note-cell{color:var(--muted);font-size:12.5px;}
  .wb-editable{cursor:pointer;}
  .wb-editable:hover{text-decoration:underline;}
  .wb-board{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;}
  .wb-board-col{background:var(--surface);border:1.5px solid var(--line);border-radius:10px;overflow:hidden;}
  .wb-board-col .col-head{padding:9px 12px;font-size:13px;font-weight:700;color:#fff;}
  .wb-board-col .col-body{padding:10px 12px;display:flex;flex-direction:column;gap:6px;min-height:40px;}
  .wb-board-col .name-chip{font-size:13px;color:var(--text);}
  .wb-board-col .empty-col{font-size:11.5px;color:var(--muted);}

  /* ---------- 安否確認 ---------- */
  .safety-banner{background:linear-gradient(180deg,#1C5AA5,#124079);color:#fff;border-radius:12px;padding:20px;margin-bottom:16px;}
  .safety-banner h2{margin:0 0 6px;font-size:16px;}
  .safety-banner .msg{font-size:13.5px;line-height:1.7;white-space:pre-wrap;opacity:.95;}
  .safety-form{background:var(--surface);border:1.5px solid var(--line);border-radius:10px;padding:16px;}
  .safety-radio-group{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;}
  .safety-radio-option{display:flex;align-items:center;gap:9px;border:1.5px solid var(--line);border-radius:8px;padding:10px 12px;cursor:pointer;font-size:13.5px;}
  .safety-radio-option.checked{border-color:var(--brand);background:#F4F8FC;}
  .safety-radio-option input{width:auto;}
  .safety-answered-note{font-size:12px;color:var(--muted);margin-top:10px;}
  .safety-none{color:var(--muted);font-size:13.5px;text-align:center;padding:40px 10px;}

  /* modal */
  .modal-overlay{
    position:fixed;inset:0;background:rgba(15,25,40,.45);display:none;align-items:center;justify-content:center;padding:20px;z-index:50;
  }
  .modal-overlay.show{display:flex;}
  .modal{background:#fff;border-radius:12px;padding:22px;width:100%;max-width:380px;}
  .modal h3{margin:0 0 4px;font-size:16px;}
  .modal .sub{font-size:12px;color:var(--muted);font-family:var(--mono);margin-bottom:16px;}
  .modal .field{margin-bottom:14px;}
  .modal textarea{width:100%;border:1px solid var(--line);border-radius:8px;padding:9px 10px;font-size:13.5px;font-family:inherit;resize:vertical;min-height:60px;}
  .modal .row-btns{display:flex;gap:8px;margin-top:6px;}
  .modal .row-btns button{flex:1;padding:10px;border-radius:8px;border:none;font-size:13.5px;font-weight:600;}
  .modal-err{color:var(--danger);font-size:12px;margin-top:8px;min-height:16px;}

  .toast{
    position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1F2937;color:#fff;padding:10px 18px;
    border-radius:8px;font-size:13px;z-index:60;opacity:0;transition:opacity .25s;pointer-events:none;
  }
  .toast.show{opacity:1;}

  @media (max-width:520px){
    main{padding:12px;}
    .timeline{min-width:560px;}
  }
</style>
</head>

        <textarea id="modal-purpose" placeholder="例）〇〇現場 測量／〇〇工事 打合せ／〇〇市役所"></textarea>

  <div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore, collection, doc, getDoc, setDoc, updateDoc, addDoc, deleteDoc, query, where,
  onSnapshot, orderBy, limit, Timestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { firebaseConfig, BUSINESS_HOURS, CATEGORIES, SAFETY_STATUSES } from "./firebase-config.js";

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* ---------- メールリンクからの自動入力・自動選択 ---------- */
const urlParams = new URLSearchParams(location.search);
const urlPreselect = {
  campaign: urlParams.get("campaign"),
  status: urlParams.get("status"),
  email: urlParams.get("email")
};
if(urlPreselect.email){
  const emailInput = document.getElementById("login-email");
  if(emailInput) emailInput.value = urlPreselect.email;
}

/* ---------- helpers ---------- */
const pad2 = n => String(n).padStart(2,"0");
const todayStr = () => {
  const d = new Date();
  return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
};
function buildSlots(){
  const slots = [];
  const { startHour, endHour, slotMinutes } = BUSINESS_HOURS;
  let cur = startHour*60;
  const end = endHour*60;
  while(cur < end){
    const h = Math.floor(cur/60), m = cur%60;
    slots.push({ start: cur, label: `${pad2(h)}:${pad2(m)}` });
    cur += slotMinutes;
  }
  return slots;
}
const SLOTS = buildSlots();
const SLOT_MIN = BUSINESS_HOURS.slotMinutes;
function minutesToHHMM(mins){ return `${pad2(Math.floor(mins/60))}:${pad2(mins%60)}`; }
function toast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"), 2400);
}
function catInfo(id){ return CATEGORIES.find(c=>c.id===id) || {label:id, color:"#888"}; }
function formatDateJP(dateStr){
  const d = new Date(dateStr + "T00:00:00");
  const labels = ["日","月","火","水","木","金","土"];
  return `${dateStr}(${labels[d.getDay()]})`;
}

/* ---------- state ---------- */
let currentUser = null;
let isAdmin = false;
let isPoster = false;
let isWhereaboutsEditor = false;
let equipmentAll = [];
let selectedCategory = CATEGORIES[0]?.id || null;
let selectedEquipment = null;
let selectedDate = todayStr();
let reservationsUnsub = null;
let reservationsForDay = [];
let pendingStart = null, pendingEnd = null;
let myResUnsub = null;

let employeesAll = [];
let departmentsAll = [];
let wbStatusesAll = [];
let noticesAll = [];
let activeSafetyCampaign = null;
let mySafetyResponse = null;
let wbEditingEmail = null;
let wbCurrentView = "list";

/* ---------- auth ---------- */
document.getElementById("login-btn").addEventListener("click", doLogin);
document.getElementById("login-password").addEventListener("keydown", e=>{ if(e.key==="Enter") doLogin(); });

async function doLogin(){
  const email = document.getElementById("login-email").value.trim();
  const pw = document.getElementById("login-password").value;
  const errEl = document.getElementById("login-error");
  errEl.textContent = "";
  if(!email || !pw){ errEl.textContent = "メールアドレスとパスワードを入力してください。"; return; }
  try{
    await signInWithEmailAndPassword(auth, email, pw);
  }catch(e){
    errEl.textContent = "ログインに失敗しました。メールアドレスまたはパスワードをご確認ください。";
  }
}
document.getElementById("logout-btn").addEventListener("click", ()=> signOut(auth));

onAuthStateChanged(auth, async (user)=>{
  if(user){
    currentUser = user;
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("app").style.display = "flex";
    document.getElementById("user-email").textContent = user.email;
    try{
      const adminDoc = await getDoc(doc(db, "admins", user.email));
      isAdmin = adminDoc.exists();
    }catch(e){ isAdmin = false; }
    try{
      const posterDoc = await getDoc(doc(db, "announcement_posters", user.email));
      isPoster = isAdmin || posterDoc.exists();
    }catch(e){ isPoster = isAdmin; }
    try{
      const wbEditorDoc = await getDoc(doc(db, "whereabouts_editors", user.email));
      isWhereaboutsEditor = isAdmin || wbEditorDoc.exists();
    }catch(e){ isWhereaboutsEditor = isAdmin; }
    document.getElementById("admin-link").style.display = isAdmin ? "inline-block" : "none";
    document.getElementById("notice-new-btn").style.display = isPoster ? "inline-block" : "none";
    await ensureEmployeeRecord();
    initEquipmentListener();
    initMyReservationsListener();
    initNoticesListener();
    initDepartmentsListener();
    initWbStatusesListener();
    initEmployeesListener();
    initSafetyCampaignListener();

    if(urlPreselect.campaign){
      switchToTab("safety");
      history.replaceState(null, "", location.pathname);
    }
  }else{
    currentUser = null;
    document.getElementById("login-screen").style.display = "flex";
    document.getElementById("app").style.display = "none";
  }
});

/* ---------- tabs ---------- */
const ALL_VIEWS = ["notices","whereabouts","reserve","safety"];
const TAB_ORDER_KEY = "osakagumi-portal-tab-order";
function switchToTab(viewName){
  document.querySelectorAll(".tab-btn").forEach(b=>{
    b.classList.toggle("active", b.dataset.view===viewName);
  });
  ALL_VIEWS.forEach(name=>{
    document.getElementById("view-"+name).style.display = (name===viewName) ? "block":"none";
  });
}
document.querySelectorAll(".tab-btn").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    if(document.getElementById("main-tabs").classList.contains("reordering")) return;
    switchToTab(btn.dataset.view);
  });
});

/* ---------- タブの並び替え ---------- */
function applySavedTabOrder(){
  let saved;
  try{ saved = JSON.parse(localStorage.getItem(TAB_ORDER_KEY) || "null"); }catch(e){ saved = null; }
  if(!saved || !Array.isArray(saved)) return;
  const nav = document.getElementById("main-tabs");
  const reorderBtn = document.getElementById("tab-reorder-toggle");
  saved.forEach(viewName=>{
    const btn = nav.querySelector(`.tab-btn[data-view="${viewName}"]`);
    if(btn) nav.insertBefore(btn, reorderBtn);
  });
}
function currentTabOrder(){
  return Array.from(document.querySelectorAll("#main-tabs .tab-btn")).map(b=>b.dataset.view);
}
function saveTabOrder(){
  localStorage.setItem(TAB_ORDER_KEY, JSON.stringify(currentTabOrder()));
}
function moveTab(viewName, direction){
  const nav = document.getElementById("main-tabs");
  const btn = nav.querySelector(`.tab-btn[data-view="${viewName}"]`);
  if(!btn) return;
  if(direction==="left" && btn.previousElementSibling && btn.previousElementSibling.classList.contains("tab-btn")){
    nav.insertBefore(btn, btn.previousElementSibling);
  } else if(direction==="right" && btn.nextElementSibling && btn.nextElementSibling.classList.contains("tab-btn")){
    nav.insertBefore(btn.nextElementSibling, btn);
  }
  saveTabOrder();
  renderReorderArrows();
}
function renderReorderArrows(){
  document.querySelectorAll("#main-tabs .tab-btn").forEach(btn=>{
    btn.querySelectorAll(".reorder-arrow").forEach(a=>a.remove());
    if(!document.getElementById("main-tabs").classList.contains("reordering")) return;
    const left = document.createElement("span");
    left.className = "reorder-arrow left";
    left.textContent = "◀";
    left.addEventListener("click", (e)=>{ e.stopPropagation(); moveTab(btn.dataset.view, "left"); });
    const right = document.createElement("span");
    right.className = "reorder-arrow right";
    right.textContent = "▶";
    right.addEventListener("click", (e)=>{ e.stopPropagation(); moveTab(btn.dataset.view, "right"); });
    btn.prepend(left);
    btn.appendChild(right);
  });
}
document.getElementById("tab-reorder-toggle").addEventListener("click", ()=>{
  const nav = document.getElementById("main-tabs");
  const reordering = nav.classList.toggle("reordering");
  document.getElementById("tab-reorder-toggle").textContent = reordering ? "完了" : "並び替え";
  renderReorderArrows();
});
applySavedTabOrder();

/* ---------- 社員名簿（行き先ボード兼用） ---------- */
async function ensureEmployeeRecord(){
  try{
    const ref = doc(db, "employees", currentUser.email);
    const snap = await getDoc(ref);
    if(!snap.exists()){
      await setDoc(ref, {
        name: currentUser.displayName || currentUser.email.split("@")[0],
        email: currentUser.email,
        department: "",
        order: 0,
        status: "",
        note: "",
        statusUpdatedAt: new Date().toISOString(),
        lastLogin: new Date().toISOString()
      });
    } else {
      await updateDoc(ref, { lastLogin: new Date().toISOString() });
    }
  }catch(e){ /* ロールの読み書き権限がまだ整っていない場合は静かに無視 */ }
}

/* ---------- categories & equipment ---------- */
function renderCategoryRow(){
  const row = document.getElementById("cat-row");
  row.innerHTML = "";
  CATEGORIES.forEach(cat=>{
    const pill = document.createElement("button");
    pill.className = "cat-pill" + (cat.id===selectedCategory ? " active":"");
    pill.style.color = cat.color;
    pill.innerHTML = `<span class="dot" style="background:${cat.color}"></span>${cat.label}`;
    pill.addEventListener("click", ()=>{
      selectedCategory = cat.id;
      selectedEquipment = null;
      document.getElementById("timeline-panel").classList.remove("show");
      renderCategoryRow();
      renderEquipmentGrid();
    });
    row.appendChild(pill);
  });
}

function initEquipmentListener(){
  const q = query(collection(db,"equipment"), where("active","==",true));
  onSnapshot(q, snap=>{
    equipmentAll = snap.docs.map(d=>({id:d.id, ...d.data()}));
    equipmentAll.sort((a,b)=> (a.order??0)-(b.order??0) || a.name.localeCompare(b.name,"ja"));
    renderCategoryRow();
    renderEquipmentGrid();
  });
}

function renderEquipmentGrid(){
  const grid = document.getElementById("eq-grid");
  grid.innerHTML = "";
  const items = equipmentAll.filter(e=>e.category===selectedCategory);
  if(items.length===0){
    grid.innerHTML = `<div class="eq-card empty">このカテゴリに登録された設備はまだありません。管理画面から追加してください。</div>`;
    return;
  }
  items.forEach(eq=>{
    const card = document.createElement("button");
    card.className = "eq-card" + (selectedEquipment?.id===eq.id ? " selected":"");
    card.innerHTML = `<div class="name">${escapeHtml(eq.name)}</div><div class="note">${escapeHtml(eq.note||"")}</div>`;
    card.addEventListener("click", ()=>{
      selectedEquipment = eq;
      pendingStart = pendingEnd = null;
      renderEquipmentGrid();
      showTimelinePanel();
    });
    grid.appendChild(card);
  });
}

function escapeHtml(s){
  return String(s??"").replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ---------- timeline ---------- */
document.getElementById("date-input").value = selectedDate;
updateWeekdayBadge();
document.getElementById("date-input").addEventListener("change", e=>{
  selectedDate = e.target.value || todayStr();
  pendingStart = pendingEnd = null;
  updateWeekdayBadge();
  loadReservationsForDay();
});
document.getElementById("date-prev").addEventListener("click", ()=> shiftDate(-1));
document.getElementById("date-next").addEventListener("click", ()=> shiftDate(1));
function shiftDate(delta){
  const d = new Date(selectedDate + "T00:00:00");
  d.setDate(d.getDate()+delta);
  selectedDate = `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
  document.getElementById("date-input").value = selectedDate;
  pendingStart = pendingEnd = null;
  updateWeekdayBadge();
  loadReservationsForDay();
}
function updateWeekdayBadge(){
  const d = new Date(selectedDate + "T00:00:00");
  const labels = ["日","月","火","水","木","金","土"];
  const label = document.getElementById("date-picker-label");
  const dow = d.getDay();
  label.textContent = `${selectedDate.replace(/-/g,"/")}(${labels[dow]})`;
  label.classList.remove("weekend-sat","weekend-sun");
  if(dow===6) label.classList.add("weekend-sat");
  if(dow===0) label.classList.add("weekend-sun");
}

function showTimelinePanel(){
  const panel = document.getElementById("timeline-panel");
  panel.classList.add("show");
  const cat = catInfo(selectedEquipment.category);
  document.getElementById("tl-eq-title").innerHTML =
    `${escapeHtml(selectedEquipment.name)}<span class="cat-tag" style="background:${cat.color}">${cat.label}</span>`;
  updateWeekdayBadge();
  renderRuler();
  loadReservationsForDay();
}

function renderRuler(){
  const ruler = document.getElementById("tl-ruler");
  ruler.innerHTML = "";
  SLOTS.forEach(s=>{
    const isHour = s.start % 60 === 0;
    const tick = document.createElement("div");
    tick.className = "tick";
    tick.textContent = isHour ? s.label : "";
    ruler.appendChild(tick);
  });
}

function loadReservationsForDay(){
  if(reservationsUnsub){ reservationsUnsub(); reservationsUnsub = null; }
  if(!selectedEquipment) return;
  const q = query(
    collection(db,"reservations"),
    where("equipmentId","==", selectedEquipment.id),
    where("date","==", selectedDate)
  );
  reservationsUnsub = onSnapshot(q, snap=>{
    reservationsForDay = snap.docs.map(d=>({id:d.id, ...d.data()}));
    renderSlots();
  });
}

function renderSlots(){
  const wrap = document.getElementById("tl-slots");
  wrap.innerHTML = "";
  const now = new Date();
  const isToday = selectedDate === todayStr();
  const nowMins = now.getHours()*60 + now.getMinutes();
  const cat = catInfo(selectedEquipment.category);

  SLOTS.forEach(s=>{
    const div = document.createElement("div");
    div.className = "slot" + (s.start%60===0 ? " hour-start":"");
    const isPast = isToday && s.start < nowMins;

    const booking = reservationsForDay.find(r=>{
      const [sh,sm] = r.startTime.split(":").map(Number);
      const [eh,em] = r.endTime.split(":").map(Number);
      const startM = sh*60+sm, endM = eh*60+em;
      return s.start >= startM && s.start < endM;
    });

    if(booking){
      div.classList.add("booked");
      div.style.setProperty("--slot-color", cat.color);
      div.title = `${booking.startTime}-${booking.endTime} ${booking.userName||booking.userEmail}\n${booking.purpose||""}`;
      if(s.start === Math.round(timeToMinutes(booking.startTime))){
        const lbl = document.createElement("div");
        lbl.className = "lbl";
        lbl.textContent = `${booking.userName || booking.userEmail}`;
        div.appendChild(lbl);
      }
    } else if(isPast){
      div.classList.add("past");
    } else {
      div.classList.add("free");
      div.addEventListener("click", ()=> handleSlotClick(s.start));
    }
    wrap.appendChild(div);
  });

  updateSelectionRendering();
}

function timeToMinutes(hhmm){
  const [h,m] = hhmm.split(":").map(Number);
  return h*60+m;
}

function handleSlotClick(slotStart){
  if(pendingStart===null){
    pendingStart = slotStart;
    pendingEnd = slotStart + SLOT_MIN;
  } else if(pendingEnd===null){
    // shouldn't happen, safety
    pendingEnd = slotStart + SLOT_MIN;
  } else {
    // extend/reset selection
    const lo = Math.min(pendingStart, slotStart);
    const hi = Math.max(pendingStart, slotStart) + SLOT_MIN;
    // check no booked slot within range
    if(rangeHasConflict(lo, hi)){
      pendingStart = slotStart; pendingEnd = slotStart + SLOT_MIN;
    } else {
      pendingStart = lo; pendingEnd = hi;
    }
  }
  renderSlots();
}

function rangeHasConflict(lo, hi){
  return reservationsForDay.some(r=>{
    const s = timeToMinutes(r.startTime), e = timeToMinutes(r.endTime);
    return Math.max(lo,s) < Math.min(hi,e);
  });
}

function updateSelectionRendering(){
  const bar = document.getElementById("selection-bar");
  if(pendingStart===null || pendingEnd===null){
    bar.style.display = "none";
    return;
  }
  const lo = Math.min(pendingStart,pendingEnd), hi = Math.max(pendingStart,pendingEnd);
  // paint pending slots
  const slotEls = document.getElementById("tl-slots").children;
  SLOTS.forEach((s, idx)=>{
    const el = slotEls[idx];
    if(!el) return;
    if(el.classList.contains("booked") || el.classList.contains("past")) return;
    if(s.start >= lo && s.start < hi){
      el.classList.add("pending"); el.classList.remove("free");
    }
  });
  bar.style.display = "flex";
  document.getElementById("selection-range").textContent =
    `${minutesToHHMM(lo)} 〜 ${minutesToHHMM(hi)}`;
}

document.getElementById("clear-selection").addEventListener("click", ()=>{
  pendingStart = pendingEnd = null;
  renderSlots();
});

/* ---------- reserve modal ---------- */
const reserveModal = document.getElementById("reserve-modal");
document.getElementById("open-reserve-modal").addEventListener("click", ()=>{
  if(pendingStart===null || pendingEnd===null) return;
  const lo = Math.min(pendingStart,pendingEnd), hi = Math.max(pendingStart,pendingEnd);
  document.getElementById("modal-summary").textContent =
    `${selectedEquipment.name} / ${formatDateJP(selectedDate)} ${minutesToHHMM(lo)}〜${minutesToHHMM(hi)}`;
  document.getElementById("modal-purpose").value = "";
  document.getElementById("modal-error").textContent = "";
  reserveModal.classList.add("show");
});
document.getElementById("modal-cancel").addEventListener("click", ()=> reserveModal.classList.remove("show"));
document.getElementById("modal-confirm").addEventListener("click", confirmReservation);

async function confirmReservation(){
  const errEl = document.getElementById("modal-error");
  errEl.textContent = "";
  const lo = Math.min(pendingStart,pendingEnd), hi = Math.max(pendingStart,pendingEnd);
  if(rangeHasConflict(lo,hi)){
    errEl.textContent = "この時間帯は既に予約されています。画面を更新して選び直してください。";
    return;
  }
  const purpose = document.getElementById("modal-purpose").value.trim();
  try{
    await addDoc(collection(db,"reservations"), {
      equipmentId: selectedEquipment.id,
      equipmentName: selectedEquipment.name,
      category: selectedEquipment.category,
      date: selectedDate,
      startTime: minutesToHHMM(lo),
      endTime: minutesToHHMM(hi),
      purpose,
      userId: currentUser.uid,
      userEmail: currentUser.email,
      userName: currentUser.displayName || currentUser.email,
      createdAt: Timestamp.now()
    });
    reserveModal.classList.remove("show");
    pendingStart = pendingEnd = null;
    toast("予約を確定しました。");
  }catch(e){
    errEl.textContent = "予約の登録に失敗しました。時間をおいて再度お試しください。";
  }
}

/* ---------- my reservations ---------- */
function initMyReservationsListener(){
  if(myResUnsub) myResUnsub();
  const q = query(collection(db,"reservations"), where("userId","==", currentUser.uid));
  myResUnsub = onSnapshot(q, snap=>{
    const list = snap.docs.map(d=>({id:d.id, ...d.data()}));
    list.sort((a,b)=> (a.date+a.startTime).localeCompare(b.date+b.startTime));
    renderMyReservations(list);
  });
}

function renderMyReservations(list){
  const el = document.getElementById("my-res-list");
  if(list.length===0){
    el.innerHTML = `<div class="empty-state">予約はまだありません。「予約する」タブから登録してください。</div>`;
    return;
  }
  const now = todayStr();
  el.innerHTML = "";
  list.forEach(r=>{
    const isPast = (r.date + r.startTime) < (now + "00:00");
    const item = document.createElement("div");
    item.className = "res-item" + (isPast ? " past":"");
    const cat = catInfo(r.category);
    item.innerHTML = `
      <div class="meta">
        <b>${escapeHtml(r.equipmentName)} <span style="color:${cat.color};font-size:11px;">[${cat.label}]</span></b>
        <div class="time">${formatDateJP(r.date)} ${r.startTime}〜${r.endTime}</div>
        <div style="color:var(--muted);font-size:12px;margin-top:2px;">${escapeHtml(r.purpose||"")}</div>
      </div>
    `;
    if(!isPast){
      const btn = document.createElement("button");
      btn.textContent = "キャンセル";
      btn.addEventListener("click", async ()=>{
        if(!confirm("この予約をキャンセルしますか？")) return;
        await deleteDoc(doc(db,"reservations", r.id));
        toast("予約をキャンセルしました。");
      });
      item.appendChild(btn);
    }
    el.appendChild(item);
  });
}

/* =========================================================
   お知らせ
========================================================= */
function tsToStr(ts){
  if(!ts) return "";
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())} ${pad2(d.getHours())}:${pad2(d.getMinutes())}`;
}

function initNoticesListener(){
  const q = query(collection(db,"announcements"), orderBy("createdAt","desc"));
  onSnapshot(q, snap=>{
    noticesAll = snap.docs.map(d=>({id:d.id, ...d.data()}));
    renderNotices();
  }, (err)=>{ console.error("[お知らせ取得エラー]", err); });
}

function renderNotices(){
  const el = document.getElementById("notice-list");
  el.innerHTML = "";
  if(noticesAll.length===0){
    el.innerHTML = `<div class="empty-state">お知らせはまだありません。</div>`;
    return;
  }
  noticesAll.forEach(n=>{
    const item = document.createElement("div");
    item.className = "notice-item";
    item.innerHTML = `
      <div class="n-head">
        <div class="n-title">${escapeHtml(n.title)}</div>
        <div class="n-meta">${escapeHtml(n.authorName||n.authorEmail||"")} ・ ${tsToStr(n.createdAt)}</div>
      </div>
      <div class="n-body">${escapeHtml(n.body||"")}</div>
    `;
    if(isAdmin || n.authorEmail===currentUser.email){
      const actions = document.createElement("div");
      actions.className = "n-actions";
      const delBtn = document.createElement("button");
      delBtn.textContent = "削除";
      delBtn.addEventListener("click", async ()=>{
        if(!confirm("このお知らせを削除しますか？")) return;
        await deleteDoc(doc(db,"announcements", n.id));
        toast("お知らせを削除しました。");
      });
      actions.appendChild(delBtn);
      item.appendChild(actions);
    }
    el.appendChild(item);
  });
}

const noticeModal = document.getElementById("notice-modal");
document.getElementById("notice-new-btn").addEventListener("click", ()=>{

  document.getElementById("notice-body").value = "";
  document.getElementById("notice-error").textContent = "";

/* =========================================================
   行き先ボード
========================================================= */
function initDepartmentsListener(){
  onSnapshot(collection(db,"departments"), snap=>{
    departmentsAll = snap.docs.map(d=>({id:d.id, ...d.data()}));
    departmentsAll.sort((a,b)=> (a.order??0)-(b.order??0));
    renderWhereabouts();
  }, (err)=>{ console.error("[所属マスタ取得エラー]", err); });
}
function initWbStatusesListener(){
  onSnapshot(collection(db,"wb_statuses"), snap=>{
    wbStatusesAll = snap.docs.map(d=>({id:d.id, ...d.data()}));
    wbStatusesAll.sort((a,b)=> (a.order??0)-(b.order??0));
    renderWhereabouts();
  }, (err)=>{ console.error("[行き先ステータス取得エラー]", err); });
}
function initEmployeesListener(){
  onSnapshot(collection(db,"employees"), snap=>{
    employeesAll = snap.docs.map(d=>({ email:d.id, ...d.data() }));
    renderWhereabouts();
  }, (err)=>{ console.error("[社員名簿取得エラー]", err); });
}

function departmentName(id){
  const d = departmentsAll.find(x=>x.id===id);
  return d ? d.name : "未所属";
}
function wbStatusInfo(id){
  return wbStatusesAll.find(x=>x.id===id) || null;
}
function getSortedEmployees(){
  const deptOrder = new Map(departmentsAll.map((d,i)=>[d.id, d.order ?? i]));
  return employeesAll.slice().sort((a,b)=>{
    const da = deptOrder.has(a.department) ? deptOrder.get(a.department) : 9999;
    const dbb = deptOrder.has(b.department) ? deptOrder.get(b.department) : 9999;
    if(da!==dbb) return da-dbb;
    if((a.order??0)!==(b.order??0)) return (a.order??0)-(b.order??0);
    return (a.name||"").localeCompare(b.name||"","ja");
  });
}

function renderWhereabouts(){
  renderWbList();
  renderWbBoard();
}

function renderWbList(){
  const body = document.getElementById("wb-table-body");
  if(!body) return;
  body.innerHTML = "";
  const list = getSortedEmployees();
  if(list.length===0){
    body.innerHTML = `<tr><td colspan="4" class="empty-state">まだ社員データがありません。ログインすると自動的に登録されます。</td></tr>`;
    return;
  }
  list.forEach(emp=>{
    const canEdit = isAdmin || isWhereaboutsEditor || emp.email===currentUser.email;
    const st = wbStatusInfo(emp.status);
    const tr = document.createElement("tr");
    const tdDept = document.createElement("td");
    tdDept.textContent = emp.department ? departmentName(emp.department) : "未所属";
    const tdName = document.createElement("td");
    tdName.textContent = emp.name || emp.email;
    const tdStatus = document.createElement("td");
    const badge = document.createElement("span");
    badge.className = "wb-status-badge" + (canEdit ? " wb-editable" : "");
    badge.style.background = st ? st.color : "#9CA3AF";
    badge.textContent = st ? st.name : "未設定";
    if(canEdit) badge.addEventListener("click", ()=> openWbModal(emp.email));
    tdStatus.appendChild(badge);
    const tdNote = document.createElement("td");
    tdNote.className = "wb-note-cell";
    tdNote.textContent = emp.note || "";
    tr.appendChild(tdDept); tr.appendChild(tdName); tr.appendChild(tdStatus); tr.appendChild(tdNote);
    body.appendChild(tr);
  });
}

function renderWbBoard(){
  const board = document.getElementById("wb-board");
  if(!board) return;
  board.innerHTML = "";
  const list = getSortedEmployees();
  const columns = wbStatusesAll.slice();
  columns.push({ id: "__unset__", name: "未設定", color: "#9CA3AF" });

  columns.forEach(col=>{
    const colEl = document.createElement("div");
    colEl.className = "wb-board-col";
    const head = document.createElement("div");
    head.className = "col-head";
    head.style.background = col.color;
    head.textContent = col.name;
    const bodyEl = document.createElement("div");
    bodyEl.className = "col-body";
    const members = list.filter(emp=>{
      if(col.id==="__unset__") return !emp.status || !wbStatusInfo(emp.status);
      return emp.status === col.id;
    });
    if(members.length===0){
      const e = document.createElement("div");
      e.className = "empty-col";
      e.textContent = "-";
      bodyEl.appendChild(e);
    } else {
      members.forEach(emp=>{
        const chip = document.createElement("div");
        chip.className = "name-chip";
        chip.textContent = emp.name || emp.email;
        bodyEl.appendChild(chip);
      });
    }
    colEl.appendChild(head); colEl.appendChild(bodyEl);
    board.appendChild(colEl);
  });
}

document.querySelectorAll("#wb-view-toggle .seg-btn").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    document.querySelectorAll("#wb-view-toggle .seg-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    wbCurrentView = btn.dataset.wbview;
    document.getElementById("wb-list-view").style.display = wbCurrentView==="list" ? "block":"none";
    document.getElementById("wb-board-view").style.display = wbCurrentView==="board" ? "block":"none";
  });
});

const wbModal = document.getElementById("wb-modal");
document.getElementById("wb-edit-my-btn").addEventListener("click", ()=> openWbModal(currentUser.email));
document.getElementById("wb-cancel").addEventListener("click", ()=> wbModal.classList.remove("show"));

function openWbModal(email){
  wbEditingEmail = email;
  const emp = employeesAll.find(e=>e.email===email);
  document.getElementById("wb-modal-title").textContent =
    email===currentUser.email ? "自分の行き先を入力" : `${emp?.name || email} さんの行き先を入力`;
  const sel = document.getElementById("wb-status-select");
  sel.innerHTML = "";
  if(wbStatusesAll.length===0){
    const opt = document.createElement("option");
    opt.value = ""; opt.textContent = "（管理画面でステータス未登録）";
    sel.appendChild(opt);
  } else {
    wbStatusesAll.forEach(s=>{
      const opt = document.createElement("option");
      opt.value = s.id; opt.textContent = s.name;
      sel.appendChild(opt);
    });
  }
  sel.value = emp?.status || (wbStatusesAll[0]?.id || "");
  document.getElementById("wb-note").value = emp?.note || "";
  document.getElementById("wb-error").textContent = "";
  wbModal.classList.add("show");
}

document.getElementById("wb-save").addEventListener("click", async ()=>{
  const errEl = document.getElementById("wb-error");
  if(wbStatusesAll.length===0){
    errEl.textContent = "先に管理画面でステータスを登録してください。";
    return;
  }
  const status = document.getElementById("wb-status-select").value;
  const note = document.getElementById("wb-note").value.trim();
  try{
    await updateDoc(doc(db,"employees", wbEditingEmail), {
      status, note,
      statusUpdatedAt: new Date().toISOString(),
      statusUpdatedBy: currentUser.email
    });
    wbModal.classList.remove("show");
    toast("行き先を更新しました。");
  }catch(e){
    errEl.textContent = "更新に失敗しました。権限をご確認ください。";
  }
});

/* =========================================================
   安否確認
========================================================= */
function initSafetyCampaignListener(){
  const q = query(collection(db,"safety_campaigns"), where("active","==",true), orderBy("createdAt","desc"), limit(1));
  onSnapshot(q, async snap=>{
    if(snap.empty){
      activeSafetyCampaign = null;
      mySafetyResponse = null;
      renderSafety();
      return;
    }
    const d = snap.docs[0];
    activeSafetyCampaign = { id:d.id, ...d.data() };
    try{
      const respSnap = await getDoc(doc(db,"safety_responses", `${activeSafetyCampaign.id}_${currentUser.uid}`));
      mySafetyResponse = respSnap.exists() ? respSnap.data() : null;
    }catch(e){ mySafetyResponse = null; }
    renderSafety();
  }, (err)=>{ console.error("[安否確認取得エラー]", err); });
}

function renderSafety(){
  const el = document.getElementById("safety-content");
  el.innerHTML = "";
  if(!activeSafetyCampaign){
    el.innerHTML = `<div class="safety-none">現在発信中の安否確認はありません。</div>`;
    return;
  }
  const banner = document.createElement("div");
  banner.className = "safety-banner";
  banner.innerHTML = `<h2>${escapeHtml(activeSafetyCampaign.title)}</h2><div class="msg">${escapeHtml(activeSafetyCampaign.message||"")}</div>`;
  el.appendChild(banner);

  const form = document.createElement("div");
  form.className = "safety-form";

  const useUrlPreselect = urlPreselect.campaign===activeSafetyCampaign.id && !!urlPreselect.status;
  const effectiveStatus = useUrlPreselect ? urlPreselect.status : mySafetyResponse?.status;
  if(useUrlPreselect){
    urlPreselect.campaign = null;
    urlPreselect.status = null;
  }

  const group = document.createElement("div");
  group.className = "safety-radio-group";
  SAFETY_STATUSES.forEach(opt=>{
    const label = document.createElement("label");
    label.className = "safety-radio-option" + (effectiveStatus===opt.id ? " checked":"");
    label.innerHTML = `<input type="radio" name="safety-status" value="${opt.id}" ${effectiveStatus===opt.id?"checked":""}> ${escapeHtml(opt.label)}`;
    label.addEventListener("click", ()=>{
      form.querySelectorAll(".safety-radio-option").forEach(l=>l.classList.remove("checked"));
      label.classList.add("checked");
    });
    group.appendChild(label);
  });
  form.appendChild(group);

  const commentField = document.createElement("div");
  commentField.className = "field";
  commentField.innerHTML = `
    <label style="display:block;font-size:12px;color:var(--muted);margin-bottom:6px;">コメント（任意）</label>
    <textarea id="safety-comment" placeholder="例）自宅は無事です／会社に向かいます" style="width:100%;min-height:60px;border:1px solid var(--line);border-radius:8px;padding:9px 10px;font-size:13.5px;font-family:inherit;"></textarea>
  `;
  form.appendChild(commentField);
  form.querySelector("#safety-comment").value = mySafetyResponse?.comment || "";

  const errDiv = document.createElement("div");
  errDiv.className = "modal-err";
  errDiv.id = "safety-error";
  form.appendChild(errDiv);

  const submitBtn = document.createElement("button");
  submitBtn.className = "btn-primary";
  submitBtn.style.width = "100%";
  submitBtn.textContent = mySafetyResponse ? "回答を更新する" : "回答する";
  submitBtn.addEventListener("click", async ()=>{
    const checked = form.querySelector('input[name="safety-status"]:checked');
    if(!checked){ errDiv.textContent = "状態を選択してください。"; return; }
    const comment = form.querySelector("#safety-comment").value.trim();
    try{
      const payload = {
        campaignId: activeSafetyCampaign.id,
        campaignTitle: activeSafetyCampaign.title,
        userId: currentUser.uid,
        userEmail: currentUser.email,
        userName: currentUser.displayName || currentUser.email,
        status: checked.value,
        comment,
        respondedAt: Timestamp.now()
      };
      await setDoc(doc(db,"safety_responses", `${activeSafetyCampaign.id}_${currentUser.uid}`), payload);
      mySafetyResponse = payload;
      toast("回答を送信しました。");
      renderSafety();
    }catch(e){
      errDiv.textContent = "送信に失敗しました。時間をおいて再度お試しください。";
    }
  });
  form.appendChild(submitBtn);

  if(mySafetyResponse){
    const note = document.createElement("div");
    note.className = "safety-answered-note";
    note.textContent = `前回の回答: ${tsToStr(mySafetyResponse.respondedAt)}`;
    form.appendChild(note);
  }

  el.appendChild(form);
}
</script>
